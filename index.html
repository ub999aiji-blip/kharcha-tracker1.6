<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Kharcha Tracker</title>
<meta name="theme-color" content="#121018" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Kharcha" />
<style>
  :root{
    --bg:#F5F3FA; --card:#ffffff; --border:#E7E3F3; --border2:#EFEBFA; --ink:#211D2E;
    --muted:#756F8C; --accent:#7C3AED; --accent-soft:#7C3AED1c; --input-bg:#FAF9FF;
    --track:#E7E3F3; --nav-bg:#211D2E; --nav-muted:#8C86A3; --shadow: 0 1px 3px rgba(33,29,46,.08);
    --green:#16A34A; --red:#DC2626; --gradient: linear-gradient(135deg,#7C3AED,#F97316);
  }
  body.dark{
    --bg:#121018; --card:#1C1928; --border:#2C2840; --border2:#252235; --ink:#F1EEF9;
    --muted:#9D97B3; --accent:#A78BFA; --accent-soft:#A78BFA2b; --input-bg:#191624;
    --track:#2C2840; --nav-bg:#15121F; --nav-muted:#746F8C; --shadow: 0 4px 16px rgba(0,0,0,.4);
    --green:#34D399; --red:#F87171; --gradient: linear-gradient(135deg,#8B5CF6,#F97316);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  svg.ic { display:block; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--ink);
    padding-bottom: 76px; transition: background .2s ease, color .2s ease;
    overflow-x: hidden;
  }
  #app { max-width: 480px; margin: 0 auto; position: relative; min-height: 100vh; }
  header { padding: 16px 18px 12px; position: relative; display:flex; align-items:flex-start; gap:12px; }
  .icon-btn-round { background: var(--card); border:1px solid var(--border); border-radius:12px; width:38px; height:38px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; color:var(--ink); transition:transform .12s ease; }
  .icon-btn-round:active { transform: scale(0.9); }
  .eyebrow { font-size: 11px; color: var(--accent); letter-spacing: 1.5px; font-weight:600; text-transform:uppercase; }
  h1 { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 20px; font-weight: 700; display: inline; margin-left: 7px; }
  .subtitle { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .khata-pill { display:inline-flex; align-items:center; gap:5px; background:var(--card); border:1px solid var(--border); color:var(--ink); font-size:11.5px; font-weight:700; padding:5px 10px; border-radius:20px; margin-top:8px; cursor:pointer; }
  main { padding: 0 16px; }
  .install-banner { display:none; align-items:center; justify-content:space-between; gap:10px;
    background:var(--accent); color:#fff; padding:10px 14px; border-radius:10px; margin-bottom:14px; font-size:13px; }
  .install-banner button { background:var(--ink); color:var(--bg); border:none; border-radius:8px; padding:7px 12px; font-size:12.5px; font-weight:700; }
  .reminder-banner { display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid #DC262655; border-left:3px solid #DC2626; border-radius:10px; padding:11px 13px; margin-bottom:14px; font-size:12px; color:var(--ink); animation: fadeSlideIn .25s ease; }
  .reminder-banner b { display:block; font-size:13px; margin-bottom:1px; }
  .streak-badge { display:inline-flex; align-items:center; gap:6px; background:var(--accent-soft); color:var(--accent); font-size:12px; font-weight:700; padding:6px 12px; border-radius:20px; margin-bottom:12px; animation: fadeSlideIn .3s ease; }
  .insight-line { font-size:12px; color:var(--muted); background:var(--card); border:1px solid var(--border); border-radius:10px; padding:9px 12px; margin-bottom:14px; animation: fadeSlideIn .3s ease; }
  .section-title { font-size: 13px; font-weight: 700; margin: 18px 0 9px; color:var(--ink); text-transform:uppercase; letter-spacing:.4px; display:flex; align-items:center; justify-content:space-between; }
  .section-title .st-action { font-size:11.5px; font-weight:700; color:var(--accent); border:none; background:none; cursor:pointer; text-transform:none; }
  .search-wrap { position:relative; margin-bottom:10px; }
  .search-wrap svg { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted); }
  .search-wrap input { width:100%; border:1px solid var(--border); border-radius:10px; padding:9px 12px 9px 34px; font-size:13.5px; background:var(--card); color:var(--ink); }
  .month-row { display:flex; align-items:center; gap:8px; margin-bottom:14px; color:var(--muted); }
  select, input, .chip, button { font-family: inherit; }
  select { border:1px solid var(--border); border-radius:8px; padding:6px 10px; font-size:13px; background:var(--card); font-weight:600; color:var(--ink); }
  .total-card { background:var(--ink); border-radius:16px; padding:18px 20px; margin-bottom:14px; animation: fadeSlideIn .25s ease; }
  body.dark .total-card { background:linear-gradient(135deg,#241F38,#1C1830); border:1px solid var(--border); }
  .total-label { color:#C7C2DB; font-size:12px; }
  body.dark .total-label { color: var(--muted); }
  .total-amount { color:#F1EEF9; font-size:30px; font-family: ui-sans-serif, system-ui, sans-serif; font-weight:700; margin-top:2px; letter-spacing:-.5px; }
  body.dark .total-amount { color: var(--ink); }
  .top-badge { margin-top:10px; display:inline-block; background:rgba(255,255,255,.12); color:#E9D8FD; font-size:11.5px; padding:4px 10px; border-radius:20px; }
  .hscroll { display:flex; gap:9px; overflow-x:auto; scroll-snap-type:x mandatory; padding-bottom:4px; margin-bottom:6px; -webkit-overflow-scrolling:touch; }
  .hscroll::-webkit-scrollbar { height:0; }
  .cat-card { scroll-snap-align:start; flex-shrink:0; width:128px; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:12px; box-shadow:var(--shadow); animation: fadeSlideIn .25s ease; }
  .cat-card .cci { width:30px; height:30px; border-radius:9px; display:flex; align-items:center; justify-content:center; margin-bottom:8px; }
  .cat-card .ccname { font-size:11.5px; font-weight:700; }
  .cat-card .ccamt { font-family:Consolas,monospace; font-weight:700; font-size:14.5px; margin-top:3px; }
  .cat-card .ccnote { font-size:9.5px; color:var(--muted); margin-top:2px; }
  .cat-card .ccwarn { font-size:9.5px; color:#C0392B; font-weight:700; margin-top:2px; }
  .budget-btn { background:none; border:none; padding:4px; cursor:pointer; opacity:.55; color:var(--ink); }
  .bartrack { height:5px; background:var(--track); border-radius:4px; overflow:hidden; margin-top:3px; }
  .barfill { height:100%; border-radius:4px; transition: width .5s ease; }
  .subrow { display:flex; justify-content:space-between; font-size:12px; margin-bottom:3px; }
  .subrow span:last-child { font-family: Consolas, monospace; }
  .empty-note { font-size:13px; color:var(--muted); padding:16px 4px; text-align:center; }
  .tx-wrap { position:relative; overflow:hidden; border-radius:10px; margin-bottom:7px; }
  .tx-delete-btn { position:absolute; top:0; bottom:0; right:0; width:84px; background:#DC2626; border:none; color:#fff; font-size:12px; font-weight:700; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; cursor:pointer; }
  .tx-row { display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--border2); border-radius:10px; padding:9px 10px; position:relative; touch-action: pan-y; animation: fadeSlideIn .25s ease; z-index:1; }
  .tx-row.selected { outline:2px solid var(--accent); }
  .tx-check { width:18px; height:18px; border-radius:5px; border:1.5px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .tx-check.checked { background:var(--accent); border-color:var(--accent); color:#fff; }
  .tx-dot { width:8px; height:8px; border-radius:4px; flex-shrink:0; }
  .tx-title { font-size:13px; font-weight:600; }
  .tx-sub { font-size:10.5px; color:var(--muted); }
  .tx-amt { font-family: Consolas, monospace; font-weight:700; margin-left:auto; margin-right:4px; font-size:13.5px; }
  .icon-btn { background:none; border:none; padding:4px; cursor:pointer; color:var(--muted); display:flex; }
  .main-card { scroll-snap-align:start; flex-shrink:0; width:106px; display:flex; flex-direction:column; align-items:center; padding:13px 6px; border-radius:12px; border:1.5px solid var(--border); background:var(--card); cursor:pointer; font-size:11px; font-weight:600; color:var(--ink); transition: transform .1s ease; text-align:center; }
  .main-card:active { transform: scale(0.95); }
  .main-card .ic-wrap { width:32px; height:32px; border-radius:9px; display:flex; align-items:center; justify-content:center; margin-bottom:6px; }
  .tx-row .ic-wrap { width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .sub-wrap { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:6px; }
  .chip { font-size:12px; padding:7px 12px; border-radius:20px; border:1.5px solid var(--border); background:var(--card); color:var(--ink); cursor:pointer; transition: transform .1s ease; }
  .chip:active { transform: scale(0.94); }
  .chip.active { background:var(--ink); color:var(--bg); border-color:var(--ink); }
  .suggest-chip { display:inline-flex; align-items:center; gap:6px; background:var(--accent-soft); color:var(--accent); border:1px dashed var(--accent); border-radius:20px; padding:6px 12px; font-size:11.5px; margin-top:8px; cursor:pointer; animation: fadeSlideIn .2s ease; }
  .form-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; margin-top:12px; }
  label.field-label { font-size:11.5px; color:var(--muted); display:block; margin-bottom:5px; margin-top:12px; font-weight:600; }
  .field-label:first-child { margin-top: 0; }
  input[type=text], input[type=number], input[type=date], input[type=tel] { width:100%; border:1px solid var(--border); border-radius:9px; padding:10px 12px; font-size:14px; background:var(--input-bg); color:var(--ink); }
  .save-btn { width:100%; margin-top:18px; background:var(--gradient); color:#fff; border:none; border-radius:12px; padding:13px; font-size:14px; font-weight:700; cursor:pointer; transition: transform .1s ease; box-shadow: 0 4px 14px rgba(124,58,237,.25); }
  .save-btn:active { transform: scale(0.97); }
  .save-btn.success { background:var(--green); color:#fff; animation: pulseGood .5s ease; }
  .save-btn.danger { background:var(--red); color:#fff; box-shadow:none; }
  .save-btn.small { margin-top:8px; padding:9px; font-size:12.5px; }
  .pick-contact-btn { width:100%; margin-top:8px; background:var(--accent-soft); color:var(--accent); border:1px dashed var(--accent); border-radius:9px; padding:9px; font-size:12px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px; }
  .loan-summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
  .loan-summary-card { background:var(--card); border:1.5px solid; border-radius:12px; padding:12px 14px; box-shadow:var(--shadow); }
  .loan-summary-label { font-size:10.5px; color:var(--muted); font-weight:600; }
  .loan-summary-amt { font-size:18px; font-weight:700; font-family: ui-sans-serif, system-ui, sans-serif; margin-top:2px; }
  .contact-row { display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--border2); border-radius:12px; padding:12px; margin-bottom:8px; cursor:pointer; box-shadow:var(--shadow); animation: fadeSlideIn .25s ease; }
  .contact-avatar { width:36px; height:36px; border-radius:12px; background:var(--gradient); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0; }
  .contact-name { font-size:13.5px; font-weight:700; }
  .contact-meta { font-size:10.5px; color:var(--muted); }
  .contact-balance { margin-left:auto; text-align:right; }
  .contact-balance .amt { font-family:Consolas,monospace; font-weight:700; font-size:13.5px; }
  .contact-balance .lbl { font-size:9px; font-weight:700; }
  .back-row { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .back-btn { background:var(--card); border:1px solid var(--border); border-radius:20px; width:34px; height:34px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; color:var(--ink); }
  .contact-header-card { background:var(--ink); border-radius:18px; padding:26px 20px 20px; margin-bottom:14px; text-align:center; }
  body.dark .contact-header-card { background:linear-gradient(135deg,#241F38,#1C1830); border:1px solid var(--border); }
  .contact-avatar-lg { width:60px; height:60px; border-radius:50%; background:var(--gradient); color:#fff; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:700; margin:0 auto 12px; box-shadow:0 4px 14px rgba(139,92,246,.35); }
  .contact-header-name { color:#F1EEF9; font-size:17px; font-weight:700; font-family: ui-sans-serif, system-ui, sans-serif; }
  body.dark .contact-header-name { color: var(--ink); }
  .contact-header-lbl-top { font-size:12px; color:#C7C2DB; margin-top:10px; }
  body.dark .contact-header-lbl-top { color: var(--muted); }
  .contact-header-bal { font-size:28px; font-weight:800; margin-top:2px; font-family: ui-sans-serif, system-ui, sans-serif; letter-spacing:-.5px; }
  .contact-header-lbl { font-size:11px; color:#C7C2DB; margin-top:2px; }
  body.dark .contact-header-lbl { color: var(--muted); }
  .add-transaction-btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; background:var(--gradient); color:#fff; border:none; border-radius:11px; padding:12px; font-size:13.5px; font-weight:700; margin-top:16px; cursor:pointer; box-shadow:0 4px 14px rgba(124,58,237,.3); }
  .wa-btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; background:#25D366; color:#fff; border:none; border-radius:11px; padding:11px; font-size:13px; font-weight:700; margin-top:10px; cursor:pointer; }
  .khata-summary-footer { display:flex; margin-top:18px; padding-top:14px; border-top:1px solid rgba(255,255,255,.12); }
  .khata-summary-footer .ksf-item { flex:1; text-align:center; }
  .khata-summary-footer .ksf-label { font-size:10px; color:#C7C2DB; }
  body.dark .khata-summary-footer .ksf-label { color: var(--muted); }
  .khata-summary-footer .ksf-val { font-size:13.5px; font-weight:700; margin-top:2px; color:#F1EEF9; }
  body.dark .khata-summary-footer .ksf-val { color: var(--ink); }
  .entry-kind-tag { font-size:9px; font-weight:700; padding:2px 7px; border-radius:6px; flex-shrink:0; }
  .running-bal { font-size:9.5px; color:var(--muted); margin-top:2px; }
  .type-toggle { display:flex; gap:8px; margin-bottom:6px; }
  .type-toggle button { flex:1; padding:10px; border-radius:10px; border:1.5px solid var(--border); background:var(--card); color:var(--ink); font-weight:700; font-size:12.5px; cursor:pointer; }
  .type-toggle button.active-give { background:var(--green); color:#fff; border-color:var(--green); }
  .type-toggle button.active-got { background:var(--red); color:#fff; border-color:var(--red); }
  .upcoming-row { display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--border2); border-radius:10px; padding:10px; margin-bottom:8px; }
  .upcoming-badge { width:36px; height:36px; border-radius:10px; background:var(--accent-soft); color:var(--accent); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:10.5px; flex-shrink:0; text-align:center; line-height:1.1; }
  .upcoming-badge.urgent { background:#DC262622; color:#DC2626; }

  .period-tabs { display:flex; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:4px; margin-bottom:16px; }
  .period-tab { flex:1; background:none; border:none; padding:9px 4px; font-size:12.5px; font-weight:700; color:var(--muted); border-radius:9px; cursor:pointer; }
  .period-tab.active { background:var(--gradient); color:#fff; }
  .summary-row-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:8px; }
  .summary-mini-card { background:var(--card); border:1.5px solid; border-radius:12px; padding:11px 8px; text-align:center; }
  .smc-label { font-size:9.5px; font-weight:700; margin-bottom:4px; }
  .smc-val { font-size:14px; font-weight:800; font-family: ui-sans-serif, system-ui, sans-serif; }
  .donut-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:16px; display:flex; align-items:center; gap:16px; }
  .donut-wrap { flex-shrink:0; }
  .donut-legend { flex:1; display:flex; flex-direction:column; gap:9px; min-width:0; }
  .legend-row { display:flex; align-items:center; gap:7px; font-size:11.5px; }
  .legend-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .legend-name { flex:1; color:var(--ink); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .legend-pct { color:var(--muted); width:32px; text-align:right; }
  .legend-amt { color:var(--ink); font-weight:700; font-family:Consolas,monospace; width:62px; text-align:right; }
  .trend-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:16px 14px 10px; }
  .trend-legend { display:flex; gap:16px; margin-bottom:8px; font-size:11px; color:var(--muted); }
  .trend-legend span { display:inline-flex; align-items:center; gap:5px; }
  nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:var(--nav-bg); display:flex; justify-content:space-around; padding:8px 0 12px; border-top-left-radius:18px; border-top-right-radius:18px; }
  nav button { background:none; border:none; display:flex; flex-direction:column; align-items:center; color:var(--nav-muted); font-size:10px; cursor:pointer; position:relative; transition: transform .1s ease; flex:1; gap:3px; }
  nav button:active { transform: scale(0.9); }
  nav button.active { color:var(--accent); font-weight:700; }
  #navAdd .navic { background:var(--gradient); width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-top:-22px; box-shadow:0 4px 14px rgba(139,92,246,.45); border:3px solid var(--nav-bg); color:#fff; }
  #navAdd.active .navic, #navAdd .navic { color:#fff; }
  .hidden { display:none !important; }

  .drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:40; opacity:0; pointer-events:none; transition:opacity .22s ease; }
  .drawer-overlay.open { opacity:1; pointer-events:auto; }
  .drawer-panel { position:fixed; top:0; left:0; bottom:0; width:84%; max-width:360px; background:var(--bg); z-index:41; transform:translateX(-105%); transition:transform .25s ease; overflow-y:auto; }
  .drawer-panel.open { transform:translateX(0); }
  .drawer-header { background:linear-gradient(135deg,#2A2140,#1C1830); padding:24px 20px 18px; position:relative; }
  body.dark .drawer-header { background:linear-gradient(135deg,#2A2140,#1C1830); }
  .drawer-close { position:absolute; top:16px; right:16px; background:rgba(255,255,255,.15); border:none; color:#fff; width:30px; height:30px; border-radius:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .drawer-avatar-wrap { display:flex; align-items:center; gap:12px; }
  .drawer-avatar { width:54px; height:54px; border-radius:50%; background:var(--accent-soft); color:var(--accent); display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; overflow:hidden; cursor:pointer; border:2px solid rgba(255,255,255,.3); flex-shrink:0; }
  .drawer-avatar img { width:100%; height:100%; object-fit:cover; }
  .drawer-name { color:#F1EEF9; font-size:15.5px; font-weight:700; font-family: ui-sans-serif, system-ui, sans-serif; }
  .drawer-name-edit { font-size:10.5px; color:#C7C2DB; cursor:pointer; margin-top:3px; display:flex; align-items:center; gap:4px; }
  .drawer-body { padding:12px 16px 30px; }
  .drawer-item { display:flex; align-items:center; gap:12px; padding:12px 4px; cursor:pointer; border-bottom:1px solid var(--border2); }
  .drawer-icon { width:20px; flex-shrink:0; color:var(--ink); display:flex; }
  .drawer-label { font-size:13px; font-weight:600; flex:1; }
  .drawer-sub { font-size:10px; color:var(--muted); margin-top:1px; }
  .toggle-switch { width:38px; height:22px; border-radius:11px; background:var(--track); position:relative; flex-shrink:0; }
  .toggle-switch.on { background:var(--accent); }
  .toggle-switch .dot { position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:#fff; transition:left .16s ease; }
  .toggle-switch.on .dot { left:18px; }
  .drawer-subpanel { padding:6px 4px 14px; }
  .lang-chip-row { display:flex; flex-wrap:wrap; gap:8px; padding:6px 4px; }
  .lang-chip { font-size:12px; padding:7px 12px; border-radius:20px; border:1.5px solid var(--border); background:var(--card); color:var(--ink); cursor:pointer; }
  .lang-chip.active { background:var(--ink); color:var(--bg); border-color:var(--ink); }

  .khata-panel-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:50; opacity:0; pointer-events:none; transition:opacity .2s ease; }
  .khata-panel-overlay.open { opacity:1; pointer-events:auto; }
  .khata-panel { position:fixed; left:8%; right:8%; top:14%; max-width:400px; margin:0 auto; background:var(--bg); border-radius:16px; z-index:51; opacity:0; transform:translateY(-12px) scale(.97); pointer-events:none; transition:all .2s ease; overflow:hidden; }
  .khata-panel.open { opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }
  .khata-panel-header { background:var(--ink); color:var(--bg); padding:15px 18px; font-weight:700; font-family: ui-sans-serif, system-ui, sans-serif; font-size:15.5px; }

  .khata-item-name { font-size:13px; font-weight:700; flex:1; }
  .khata-item-tag { font-size:9.5px; color:var(--accent); font-weight:700; }
  .create-khata-btn { width:100%; background:var(--accent-soft); color:var(--accent); border:1.5px dashed var(--accent); border-radius:10px; padding:12px; font-size:12.5px; font-weight:700; cursor:pointer; margin-bottom:12px; }

  .lock-error { color:#F87171; font-size:11.5px; margin-top:10px; min-height:16px; }
  .lock-dots { display:flex; gap:14px; }

  .lock-keypad { display:grid; grid-template-columns:repeat(3,62px); gap:12px; margin-top:22px; }
  .lock-key { width:62px; height:62px; border-radius:50%; background:rgba(255,255,255,.07); color:var(--bg); font-size:19px; font-weight:600; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; }

  .biometric-btn { margin-top:22px; display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.1); color:var(--bg); border:none; border-radius:22px; padding:10px 18px; font-size:12.5px; font-weight:700; cursor:pointer; }

  .shake { animation: shake .35s ease; }
</style>

/* ================= LOCK SCREEN ================= */
function checkLock(){
  if(lock.enabled){
    document.getElementById("lockScreen").classList.add("show");
    renderLockKeypad(); renderLockDots();
    const bioBtn = document.getElementById("bioUnlockBtn");
    if(lock.bioId){
      bioBtn.classList.remove("hidden");
      bioBtn.innerHTML = ic("fingerprint",16) + " <span>"+t("fingerprint_unlock")+"</span>";
      bioBtn.onclick = tryBiometricUnlock;
    } else {
      bioBtn.classList.add("hidden");
    }
  }
}
document.addEventListener("visibilitychange", function(){
  if(document.visibilityState === "hidden" && lock.enabled){
    document.getElementById("lockScreen").classList.add("show");
    state.pinEntry = "";
  } else if(document.visibilityState === "visible" && lock.enabled){
    renderLockKeypad(); renderLockDots();
    const bioBtn = document.getElementById("bioUnlockBtn");
    if(lock.bioId){ bioBtn.classList.remove("hidden"); bioBtn.innerHTML = ic("fingerprint",16) + " <span>"+t("fingerprint_unlock")+"</span>"; bioBtn.onclick = tryBiometricUnlock; }
  }
});
function renderLockKeypad(){
  const keys = ["1","2","3","4","5","6","7","8","9","","0","del"];
  let html = "";
  keys.forEach(function(k){
    if(k===""){ html += '<div></div>'; }
    else if(k==="del"){ html += '<button class="lock-key" onclick="lockKeyPress(\'del\')">'+ic("close",18)+'</button>'; }
    else { html += '<button class="lock-key" onclick="lockKeyPress(\''+k+'\')">'+k+'</button>'; }
  });
  document.getElementById("lockKeypad").innerHTML = html;
}
function renderLockDots(){
  let html = "";
  for(let i=0;i<4;i++){ html += '<div class="lock-dot '+(i<state.pinEntry.length?"filled":"")+'"></div>'; }
  document.getElementById("lockDots").innerHTML = html;
}
function lockKeyPress(k){
  if(k==="del"){ state.pinEntry = state.pinEntry.slice(0,-1); renderLockDots(); return; }
  if(state.pinEntry.length>=4) return;
  state.pinEntry += k; renderLockDots();
  if(state.pinEntry.length===4){
    if(state.pinEntry === lock.pin){ unlockApp(); }
    else {
      document.getElementById("lockError").textContent = "Wrong PIN, try again.";
      const dots = document.getElementById("lockDots"); dots.classList.add("shake");
      setTimeout(function(){ dots.classList.remove("shake"); state.pinEntry=""; renderLockDots(); }, 350);
    }
  }
}
function unlockApp(){
  document.getElementById("lockScreen").classList.remove("show");
  document.getElementById("lockError").textContent = ""; state.pinEntry = ""; renderAll();
}
async function tryBiometricUnlock(){
  try{
    const challenge = new Uint8Array(32); crypto.getRandomValues(challenge);
    const cred = await navigator.credentials.get({
      publicKey: { challenge: challenge, allowCredentials: [{ id: b64ToBuf(lock.bioId), type: "public-key" }], userVerification: "required", timeout: 60000 }
    });
    if(cred){ unlockApp(); }
  } catch(e){ document.getElementById("lockError").textContent = "Fingerprint not recognized. Use PIN instead."; }
}
async function registerBiometric(){
  if(!window.PublicKeyCredential){ alert("Fingerprint unlock isn't supported on this device/browser."); return; }
  try{
    const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
    if(!available){ alert("No fingerprint/biometric sensor found on this device."); return; }
    const challenge = new Uint8Array(32); crypto.getRandomValues(challenge);
    const userId = new Uint8Array(16); crypto.getRandomValues(userId);
    const cred = await navigator.credentials.create({
      publicKey: {
        challenge: challenge,
        rp: { name: "Kharcha Tracker" },
        user: { id: userId, name: "user", displayName: profile.name || "User" },
        pubKeyCredParams: [{ type:"public-key", alg:-7 }, { type:"public-key", alg:-257 }],
        authenticatorSelection: { authenticatorAttachment:"platform", userVerification:"required" },
        timeout: 60000
      }
    });
    if(cred){
      lock.bioId = bufToB64(cred.rawId);
      saveLock(lock);
      alert("Fingerprint unlock enabled.");
      renderDrawer();
    }
  } catch(e){ alert("Couldn't set up fingerprint unlock. Please try again."); }
}

function saveNewPin(){
  const p1 = document.getElementById("newPin").value.trim();
  const p2 = document.getElementById("confirmPin").value.trim();
  if(p1.length!==4 || !/^[0-9]{4}$/.test(p1)){ alert("Please enter a 4-digit PIN."); return; }
  if(p1 !== p2){ alert("PINs don't match."); return; }
  lock = { enabled:true, pin:p1, bioId: lock.bioId || "" }; saveLock(lock);
  alert("App Lock turned on. You'll need this PIN next time you open the app.");
  renderDrawer();
}
function disableLock(){
  if(!confirm("Turn off App Lock?")) return;
  lock = { enabled:false, pin:"", bioId:"" }; saveLock(lock); renderDrawer();
}

function submitUpcoming(){
  const title = document.getElementById("upTitle").value.trim();
  const amount = Number(document.getElementById("upAmount").value);
  const dueDate = document.getElementById("upDate").value || todayStr();
  const note = document.getElementById("upNote").value.trim();
  if(!title || !amount || amount<=0) return;
  upcoming.unshift({ id: uid(), title: title, amount: amount, dueDate: dueDate, note: note });
  saveUpcoming(upcoming); renderDrawer(); renderDashboard();
}
function deleteUpcoming(id){
  if(!confirm(t("confirm_delete_entry"))) return;
  upcoming = upcoming.filter(function(u){ return u.id !== id; });
  saveUpcoming(upcoming); renderDrawer(); renderDashboard();
}
function exportData(){
  const data = { khataId: activeKhataId, transactions: transactions, income: income, contacts: contacts, budgets: budgets, upcoming: upcoming, profile: profile, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = "kharcha-tracker-backup-" + todayStr() + ".json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}
document.getElementById("importFileInput").onchange = function(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try{
      const data = JSON.parse(ev.target.result);
      if(!confirm("This will replace your current khata's data with the backup file. Continue?")) return;
      transactions = data.transactions || []; income = data.income || []; contacts = data.contacts || []; budgets = data.budgets || {};
      upcoming = data.upcoming || []; profile = data.profile || profile;
      saveTx(transactions); saveIncome(income); saveContacts(contacts); saveBudgets(budgets); saveUpcoming(upcoming); saveProfile(profile);
      alert("Backup restored successfully."); renderDrawer(); renderAll();
    } catch(err){ alert("This file couldn't be read. Please choose a valid backup file."); }
  };
  reader.readAsText(file);
};
function clearAllData(){
  if(!confirm("This will permanently delete this khata's expenses and loans. Continue?")) return;
  if(!confirm("Are you absolutely sure? Consider exporting a backup first.")) return;
  localStorage.removeItem(nsKey(LS_TX_BASE)); localStorage.removeItem(nsKey(LS_INCOME_BASE)); localStorage.removeItem(nsKey(LS_CONTACTS_BASE));
  localStorage.removeItem(nsKey(LS_BUDGETS_BASE)); localStorage.removeItem(nsKey(LS_UPCOMING_BASE));
  transactions = []; income = []; contacts = []; budgets = {}; upcoming = [];
  renderDrawer(); renderAll();
}

/* ================= STREAK ================= */
function calcStreak(){
  const days = new Set(transactions.map(function(t){ return t.date; }));
  if(days.size===0) return 0;
  let streak = 0; let cursor = new Date();
  function cursorStr(){ return cursor.toISOString().slice(0,10); }
  if(!days.has(cursorStr())){ cursor.setDate(cursor.getDate()-1); if(!days.has(cursorStr())) return 0; }
  while(days.has(cursorStr())){ streak++; cursor.setDate(cursor.getDate()-1); }
  return streak;
}

/* ================= DASHBOARD ================= */
function renderDashboard(){
  const months = Array.from(new Set(transactions.map(function(t){ return monthKey(t.date); }).concat([todayStr().slice(0,7)]))).sort().reverse();
  if(months.indexOf(state.month) === -1) state.month = months[0];
  const monthTx = transactions.filter(function(t){ return monthKey(t.date) === state.month; });
  const catTotals = {}; Object.keys(MAIN_CATS).forEach(function(k){ catTotals[k]=0; });
  monthTx.forEach(function(t){ catTotals[t.main] = (catTotals[t.main]||0) + Number(t.amount); });
  const grandTotal = Object.values(catTotals).reduce(function(a,b){ return a+b; }, 0);
  const topCat = Object.entries(catTotals).sort(function(a,b){ return b[1]-a[1]; })[0];
  const prevTx = transactions.filter(function(t){ return monthKey(t.date) === prevMonthKey(state.month); });
  const prevTotal = prevTx.reduce(function(a,t){ return a+Number(t.amount); }, 0);
  const subTotals = {};
  monthTx.forEach(function(t){ const key = t.main+"::"+t.sub; subTotals[key]=(subTotals[key]||0)+Number(t.amount); });
  const subEntries = Object.entries(subTotals).sort(function(a,b){ return b[1]-a[1]; }).slice(0,6);
  const streak = calcStreak();

  let insightLine = "";
  if(prevTotal > 0 && grandTotal > 0){
    const diff = grandTotal - prevTotal;
    const pct = Math.round(Math.abs(diff)/prevTotal*100);
    if(Math.abs(pct) >= 3){
      insightLine = (diff > 0 ? t("trend_up") : t("trend_down"))+" " + pct + "% "+(diff>0?t("trend_up2"):t("trend_down2"))+" (" + fmt(Math.abs(diff)) + ").";
    }
  }

  const soonUpcoming = upcoming.filter(function(u){ const d=daysUntil(u.dueDate); return d>=0 && d<=15; }).sort(function(a,b){ return a.dueDate<b.dueDate?-1:1; });

  let html = "";
  if(soonUpcoming.length){
    const u = soonUpcoming[0]; const d = daysUntil(u.dueDate);
    html += '<div class="reminder-banner">'+ic("bell",18)+'<div><b>'+u.title+' '+t("reminder_due")+' '+(d===0?"today":"in "+d+" day"+(d===1?"":"s"))+'</b>'+fmt(u.amount)+' — '+u.dueDate+(soonUpcoming.length>1?' · +'+(soonUpcoming.length-1)+' more':'')+'</div></div>';
  }
  html += '<div class="month-row">'+ic("calendar" in ICONS?"calendar":"info",15)+'<select id="monthSelect">';
  months.forEach(function(m){ html += '<option value="'+m+'" '+(m===state.month?"selected":"")+'>'+monthLabel(m)+'</option>'; });
  html += '</select></div>';
  if(streak >= 2){ html += '<div class="streak-badge">\uD83D\uDD25 '+streak+' '+t("streak_text")+'</div>'; }
  html += '<div class="total-card"><div class="total-label">'+t("total_label")+'</div><div class="total-amount">'+fmt(grandTotal)+'</div>';
  if(topCat && topCat[1]>0){ html += '<div class="top-badge">'+t("highest_label")+': <b>'+catLabel(topCat[0])+'</b> — '+fmt(topCat[1])+'</div>'; }
  html += '</div>';
  if(insightLine){ html += '<div class="insight-line">'+insightLine+'</div>'; }
  html += '<h3 class="section-title">'+t("by_category")+'</h3><div class="hscroll">';
  Object.entries(MAIN_CATS).forEach(function(entry){
    const key = entry[0]; const cfg = entry[1];
    const budget = budgets[key]; const spent = catTotals[key]; const overBudget = budget && spent >= budget*0.8;
    html += '<div class="cat-card"><div class="cci" style="background:'+cfg.color+'1c;color:'+cfg.color+'">'+ic(cfg.icon,16)+'</div>';
    html += '<div class="ccname">'+catLabel(key)+'</div><div class="ccamt" style="color:'+cfg.color+'">'+fmt(spent)+'</div>';
    if(budget){ html += '<div class="ccnote">Budget: '+fmt(budget)+'</div>'; }
    if(overBudget){ html += '<div class="ccwarn">'+Math.round(spent/budget*100)+'% used</div>'; }
    html += '<button class="budget-btn" onclick="setBudget(\''+key+'\')" title="Set budget">'+ic("target",14)+'</button></div>';
  });
  html += '</div>';
  if(subEntries.length){
    html += '<h3 class="section-title">'+t("where_money")+'</h3>';
    subEntries.forEach(function(entry){
      const key = entry[0]; const amt = entry[1]; const parts = key.split("::"); const main = parts[0]; const sub = parts[1];
      const pct = grandTotal ? Math.round((amt/grandTotal)*100) : 0;
      html += '<div style="margin-bottom:10px"><div class="subrow"><span>'+subLabel(sub)+'</span><span>'+fmt(amt)+'</span></div>';
      html += '<div class="bartrack"><div class="barfill" style="width:'+pct+'%;background:'+MAIN_CATS[main].color+'"></div></div></div>';
    });
  }
  html += '<h3 class="section-title">'+t("entries_title")+' ('+monthTx.length+')<button class="st-action" onclick="toggleSelectMode()">'+(state.selectMode?t("cancel_btn"):t("select_btn"))+'</button></h3>';
  html += '<div class="search-wrap">'+ic("search",15)+'<input type="text" id="txSearchInput" placeholder="'+t("search_entries_ph")+'" value="'+state.txSearch.replace(/"/g,"&quot;")+'" /></div>';
  html += '<p style="font-size:10.5px;color:var(--muted);margin-bottom:8px;">'+t("entries_tip")+'</p>';
  html += '<div id="entriesListContainer"></div>';
  document.getElementById("dashboardTab").innerHTML = html;
  document.getElementById("monthSelect").onchange = function(e){ state.month = e.target.value; renderDashboard(); };
  const searchInput = document.getElementById("txSearchInput");
  searchInput.oninput = function(e){ state.txSearch = e.target.value; renderEntriesList(monthTx); };
  renderEntriesList(monthTx);
}
function renderEntriesList(monthTx){
  const container = document.getElementById("entriesListContainer");
  const q = state.txSearch.trim().toLowerCase();
  const filtered = q ? monthTx.filter(function(t2){
    return subLabel(t2.sub).toLowerCase().indexOf(q)!==-1 || catLabel(t2.main).toLowerCase().indexOf(q)!==-1 || (t2.note||"").toLowerCase().indexOf(q)!==-1;
  }) : monthTx;
  let html = "";
  if(monthTx.length===0){ html = '<div class="empty-note">'+t("no_entries")+'</div>'; }
  else if(filtered.length===0){ html = '<div class="empty-note">'+t("no_search_results")+'</div>'; }
  else {
    filtered.forEach(function(t2){
      const isSel = state.selectedIds.indexOf(t2.id) !== -1;
      html += '<div class="tx-wrap"><button class="tx-delete-btn" onclick="deleteTx(\''+t2.id+'\')">'+ic("trash",16)+'<span>'+t("delete_word")+'</span></button>';
      html += '<div class="tx-row '+(isSel?"selected":"")+'" data-id="'+t2.id+'" data-kind="tx" onclick="'+(state.selectMode?"toggleSelectEntry('"+t2.id+"')":"")+'">';
      if(state.selectMode){ html += '<div class="tx-check '+(isSel?"checked":"")+'">'+(isSel?ic("check",11):"")+'</div>'; }
      else { html += '<div class="tx-dot" style="background:'+MAIN_CATS[t2.main].color+'"></div>'; }
      html += '<div><div class="tx-title">'+subLabel(t2.sub)+'</div><div class="tx-sub">'+t2.date+' · '+catLabel(t2.main)+(t2.note?" · "+t2.note:"")+'</div></div>';
      html += '<div class="tx-amt">'+fmt(t2.amount)+'</div></div></div>';
    });
    if(state.selectMode && state.selectedIds.length){
      html += '<button class="save-btn danger" onclick="deleteSelected()">'+t("delete_word")+' '+state.selectedIds.length+'</button>';
    }
  }
  container.innerHTML = html;
  if(!state.selectMode) attachSwipeHandlers();
}
function toggleSelectMode(){ state.selectMode = !state.selectMode; state.selectedIds = []; renderDashboard(); }
function toggleSelectEntry(id){ const idx = state.selectedIds.indexOf(id); if(idx===-1) state.selectedIds.push(id); else state.selectedIds.splice(idx,1); renderDashboard(); }
function deleteSelected(){
  if(!confirm(t("confirm_delete_multi").replace("{n}", state.selectedIds.length))) return;
  transactions = transactions.filter(function(t){ return state.selectedIds.indexOf(t.id)===-1; });
  saveTx(transactions); state.selectMode=false; state.selectedIds=[]; renderDashboard();
}
function deleteTx(id){
  if(!confirm(t("confirm_delete_entry"))) return;
  transactions = transactions.filter(function(t){ return t.id!==id; });
  saveTx(transactions);
  state.openSwipeId = null;
  renderDashboard();
}
function setBudget(key){
  const current = budgets[key] || "";
  const val = prompt("Set a monthly budget for " + catLabel(key) + " (leave blank to remove):", current);
  if(val === null) return;
  const num = Number(val);
  if(val.trim()===""){ delete budgets[key]; } else if(num > 0){ budgets[key] = num; }
  saveBudgets(budgets); renderDashboard();
}
function attachSwipeHandlers(){
  document.querySelectorAll('.tx-row[data-kind]').forEach(function(row){
    let startX=0, currentX=0, dragging=false, baseX = (row.getAttribute('data-id')===state.openSwipeId) ? -84 : 0;
    row.style.transform = 'translateX('+baseX+'px)';
    row.addEventListener('touchstart', function(e){ startX=e.touches[0].clientX; dragging=true; row.style.transition='none'; }, {passive:true});
    row.addEventListener('touchmove', function(e){
      if(!dragging) return;
      let dx = e.touches[0].clientX-startX + baseX;
      if(dx>0) dx=0; if(dx<-84) dx=-84;
      currentX = dx;
      row.style.transform = 'translateX('+dx+'px)';
    }, {passive:true});
    row.addEventListener('touchend', function(){
      dragging=false; row.style.transition='transform .18s ease';
      const id = row.getAttribute('data-id');
      if(currentX < -42){ row.style.transform='translateX(-84px)'; state.openSwipeId = id; }
      else { row.style.transform='translateX(0)'; if(state.openSwipeId===id) state.openSwipeId=null; }
    });
    row.addEventListener('click', function(){
      if(baseX===-84 && !state.selectMode){ row.style.transition='transform .18s ease'; row.style.transform='translateX(0)'; state.openSwipeId=null; }
    });
  });
}

/* ================= REPORTS ================= */
function getPeriodRange(period){
  const now = new Date();
  if(period === "weekly"){
    const end = new Date(now); const start = new Date(now); start.setDate(start.getDate()-6);
    return { start: start, end: end };
  }
  if(period === "yearly"){
    return { start: new Date(now.getFullYear(),0,1), end: new Date(now.getFullYear(),11,31) };
  }
  return { start: new Date(now.getFullYear(), now.getMonth(), 1), end: new Date(now.getFullYear(), now.getMonth()+1, 0) };
}
function inRange(dateStr, range){
  const d = new Date(dateStr);
  return d >= range.start && d <= new Date(range.end.getFullYear(), range.end.getMonth(), range.end.getDate(), 23,59,59);
}
function buildDonutSVG(segments, totalVal){
  const size = 148, r = 54, cx = size/2, cy = size/2, circ = 2*Math.PI*r;
  let offset = 0;
  let circles = '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--track)" stroke-width="18"/>';
  segments.forEach(function(seg){
    if(seg.value<=0) return;
    const frac = seg.value/totalVal;
    const dash = frac*circ;
    circles += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+seg.color+'" stroke-width="18" stroke-dasharray="'+dash+' '+(circ-dash)+'" stroke-dashoffset="'+(-offset)+'" transform="rotate(-90 '+cx+' '+cy+')" stroke-linecap="butt"/>';
    offset += dash;
  });
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+circles+'</svg>';
}
function buildTrendSVG(buckets){
  const w = 300, h = 130, padL = 34, padB = 20, padT = 10, padR = 10;
  const maxVal = Math.max(1, Math.max.apply(null, buckets.map(function(b){ return Math.max(b.income,b.expense); })));
  const stepX = (w-padL-padR) / Math.max(1,(buckets.length-1));
  function yFor(v){ return h-padB - (v/maxVal)*(h-padB-padT); }
  function xFor(i){ return padL + i*stepX; }
  function pathFor(key){
    return buckets.map(function(b,i){ return (i===0?"M":"L")+xFor(i).toFixed(1)+","+yFor(b[key]).toFixed(1); }).join(" ");
  }
  let grid = "";
  for(let g=0; g<=3; g++){
    const val = Math.round(maxVal*g/3);
    const y = yFor(val);
    grid += '<line x1="'+padL+'" y1="'+y+'" x2="'+(w-padR)+'" y2="'+y+'" stroke="var(--border)" stroke-width="1"/>';
    grid += '<text x="2" y="'+(y+3)+'" font-size="8" fill="var(--muted)">'+fmtK(val)+'</text>';
  }
  let xLabels = buckets.map(function(b,i){ return '<text x="'+xFor(i)+'" y="'+(h-4)+'" font-size="8" fill="var(--muted)" text-anchor="middle">'+b.label+'</text>'; }).join("");
  let dots = "";
  buckets.forEach(function(b,i){
    dots += '<circle cx="'+xFor(i)+'" cy="'+yFor(b.income)+'" r="2.5" fill="#34D399"/>';
    dots += '<circle cx="'+xFor(i)+'" cy="'+yFor(b.expense)+'" r="2.5" fill="#F87171"/>';
  });
  return '<svg width="100%" height="130" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">'+grid+
    '<path d="'+pathFor("income")+'" fill="none" stroke="#34D399" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'+
    '<path d="'+pathFor("expense")+'" fill="none" stroke="#F87171" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'+
    dots + xLabels + '</svg>';
}
function fmtK(v){ return v>=1000 ? (v/1000)+"K" : String(v); }
function getTrendBuckets(period){
  const now = new Date();
  const buckets = [];
  if(period === "yearly"){
    for(let i=4;i>=0;i--){
      const y = now.getFullYear()-i;
      const start = new Date(y,0,1), end = new Date(y,11,31);
      buckets.push({ label: String(y), start: start, end: end });
    }
  } else if(period === "weekly"){
    for(let i=5;i>=0;i--){
      const end = new Date(now); end.setDate(end.getDate()-(i*7));
      const start = new Date(end); start.setDate(start.getDate()-6);
      buckets.push({ label: (start.getMonth()+1)+"/"+start.getDate(), start: start, end: end });
    }
  } else {
    for(let i=5;i>=0;i--){
      const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      const start = new Date(d.getFullYear(), d.getMonth(), 1);
      const end = new Date(d.getFullYear(), d.getMonth()+1, 0);
      buckets.push({ label: d.toLocaleString(state.lang==="hi"?"hi-IN":"en-IN",{month:"short"}), start: start, end: end });
    }
  }
  buckets.forEach(function(b){
    b.income = income.filter(function(i2){ return inRange(i2.date, b); }).reduce(function(a,i2){ return a+Number(i2.amount); },0);
    b.expense = transactions.filter(function(t2){ return inRange(t2.date, b); }).reduce(function(a,t2){ return a+Number(t2.amount); },0);
  });
  return buckets;
}
function renderReports(){
  const range = getPeriodRange(state.reportsPeriod);
  const periodExpenses = transactions.filter(function(t2){ return inRange(t2.date, range); });
  const periodIncome = income.filter(function(i2){ return inRange(i2.date, range); });
  const totalExpense = periodExpenses.reduce(function(a,t2){ return a+Number(t2.amount); },0);
  const totalIncome = periodIncome.reduce(function(a,i2){ return a+Number(i2.amount); },0);
  const totalSavings = totalIncome - totalExpense;

  const catTotals = {}; Object.keys(MAIN_CATS).forEach(function(k){ catTotals[k]=0; });
  periodExpenses.forEach(function(t2){ catTotals[t2.main] = (catTotals[t2.main]||0)+Number(t2.amount); });
  const segments = Object.entries(MAIN_CATS).map(function(entry){ return { key:entry[0], color:entry[1].color, value: catTotals[entry[0]] }; });

  let html = '<h3 class="section-title" style="margin-top:4px;">'+t("reports_title")+'</h3>';
  html += '<div class="period-tabs">';
  ["weekly","monthly","yearly"].forEach(function(p){
    html += '<button class="period-tab '+(state.reportsPeriod===p?"active":"")+'" onclick="setReportsPeriod(\''+p+'\')">'+t("period_"+p)+'</button>';
  });
  html += '</div>';

  html += '<div class="summary-row-3">';
  html += '<div class="summary-mini-card" style="border-color:#34D39944"><div class="smc-label" style="color:#34D399">'+t("total_income")+'</div><div class="smc-val" style="color:#34D399">'+fmt(totalIncome)+'</div></div>';
  html += '<div class="summary-mini-card" style="border-color:#F8717144"><div class="smc-label" style="color:#F87171">'+t("total_expense")+'</div><div class="smc-val" style="color:#F87171">'+fmt(totalExpense)+'</div></div>';
  html += '<div class="summary-mini-card" style="border-color:#A78BFA44"><div class="smc-label" style="color:#A78BFA">'+t("total_savings")+'</div><div class="smc-val" style="color:#A78BFA">'+fmt(totalSavings)+'</div></div>';
  html += '</div>';

  html += '<h3 class="section-title">'+t("expenses_overview")+'</h3>';
  if(totalExpense<=0){
    html += '<div class="empty-note">'+t("no_data_period")+'</div>';
  } else {
    html += '<div class="donut-card"><div class="donut-wrap">'+buildDonutSVG(segments, totalExpense)+'</div><div class="donut-legend">';
    segments.slice().sort(function(a,b){ return b.value-a.value; }).forEach(function(seg){
      if(seg.value<=0) return;
      const pct = Math.round(seg.value/totalExpense*100);
      html += '<div class="legend-row"><span class="legend-dot" style="background:'+seg.color+'"></span><span class="legend-name">'+catLabel(seg.key)+'</span><span class="legend-pct">'+pct+'%</span><span class="legend-amt">'+fmt(seg.value)+'</span></div>';
    });
    html += '</div></div>';
  }

  html += '<h3 class="section-title" onclick="cycleTrendPeriod()" style="cursor:pointer;">'+t("monthly_trend")+' '+ic("chevronDown",14)+'</h3>';
  html += '<p class="swipe-hint">'+t("tap_to_change_period")+' ('+t("period_"+state.trendPeriod)+')</p>';
  const buckets = getTrendBuckets(state.trendPeriod);
  html += '<div class="trend-card"><div class="trend-legend"><span><span class="legend-dot" style="background:#34D399"></span>'+t("total_income")+'</span><span><span class="legend-dot" style="background:#F87171"></span>'+t("total_expense")+'</span></div>';
  html += buildTrendSVG(buckets) + '</div>';

  if(periodIncome.length){
    html += '<h3 class="section-title">'+t("recent_income")+'</h3>';
    periodIncome.slice(0,8).forEach(function(inc){
      const src = INCOME_SOURCES.find(function(s){ return s.key===inc.source; }) || INCOME_SOURCES[INCOME_SOURCES.length-1];
      html += '<div class="tx-wrap"><button class="tx-delete-btn" onclick="deleteIncome(\''+inc.id+'\')">'+ic("trash",16)+'<span>'+t("delete_word")+'</span></button>';
      html += '<div class="tx-row" data-id="'+inc.id+'" data-kind="income">';
      html += '<div class="ic-wrap" style="background:'+src.color+'1c;color:'+src.color+'">'+ic(src.icon,15)+'</div>';
      html += '<div><div class="tx-title">'+t(src.tKey)+'</div><div class="tx-sub">'+inc.date+(inc.note?" · "+inc.note:"")+'</div></div>';
      html += '<div class="tx-amt" style="color:#34D399">+'+fmt(inc.amount)+'</div></div></div>';
    });
  }

  document.getElementById("reportsTab").innerHTML = html;
  attachSwipeHandlers();
}

  const order = ["weekly","monthly","yearly"];

  renderReports();
}

  else {
    const sorted = c.entries.slice().sort(function(a,b){ return a.date<b.date?-1:1; });
    let running=0; const withRunning = sorted.map(function(e){ running += (e.kind==="give"?Number(e.amount):-Number(e.amount)); return { e:e, running:running }; });
    withRunning.reverse().forEach(function(item){
      const e=item.e; const isGive = e.kind==="give";
      html += '<div class="tx-wrap"><button class="tx-delete-btn" onclick="deleteEntry(\''+c.id+'\',\''+e.id+'\')">'+ic("trash",16)+'<span>'+t("delete_word")+'</span></button>';
      html += '<div class="tx-row" data-id="'+e.id+'" data-kind="entry">';
      html += '<span class="entry-kind-tag" style="background:'+(isGive?"#16A34A22":"#DC262622")+';color:'+(isGive?"#16A34A":"#DC2626")+'">'+(isGive?t("you_gave"):t("you_got"))+'</span>';
      html += '<div><div class="tx-title">'+fmt(e.amount)+'</div><div class="tx-sub">'+e.date+(e.note?" · "+e.note:"")+'</div><div class="running-bal">'+t("balance_after")+': '+fmt(item.running)+'</div></div>';
      html += '</div></div>';
    });
  }
  document.getElementById("udharTab").innerHTML = html;
  if(state.showEntryForm){ document.getElementById("saveEntryBtn").onclick = submitEntry; }
  attachSwipeHandlers();
}
function toggleEntryForm(){ state.showEntryForm = !state.showEntryForm; renderContactPage(); }
function setEntryKind(kind){ state.entryKind=kind; renderContactPage(); }
function submitEntry(){
  const c = contacts.find(function(c2){ return c2.id === state.activeContactId; }); if(!c) return;
  const amount = Number(document.getElementById("entryAmount").value);
  const date = document.getElementById("entryDate").value || todayStr();
  const note = document.getElementById("entryNote").value.trim();
  if(!amount || amount<=0) return;
  c.entries.push({ id: uid(), kind: state.entryKind, amount: amount, date: date, note: note });
  saveContacts(contacts);
  state.showEntryForm = false;
  renderContactPage();
}
function deleteEntry(contactId, entryId){
  if(!confirm(t("confirm_delete_entry"))) return;
  const c = contacts.find(function(c2){ return c2.id === contactId; }); if(!c) return;
  c.entries = c.entries.filter(function(e){ return e.id !== entryId; });
  state.openSwipeId = null;
  saveContacts(contacts); renderContactPage();
}
function sendWhatsApp(contactId){
  const c = contacts.find(function(c2){ return c2.id === contactId; }); if(!c) return;
  const bal = contactBalance(c); let msg="";
  if(bal>0){ msg = "Namaste " + c.name + ", hamare hisaab ke mutabik aapko mera " + fmt(bal) + " dena hai. Kripya jab suvidha ho tab clear kar dijiye. Dhanyawad!"; }
  else if(bal<0){ msg = "Namaste " + c.name + ", hamare hisaab ke mutabik mujhe aapka " + fmt(-bal) + " dena hai. Bata dijiyega kab de saku. Dhanyawad!"; }
  else { msg = "Namaste " + c.name + ", hamara hisaab poora settled hai. Dhanyawad!"; }
  const encoded = encodeURIComponent(msg);
  let phone = (c.phone || "").replace(/[^0-9]/g, ""); let url = "";
  if(phone.length >= 10){ if(phone.length===10) phone = "91"+phone; url = "https://wa.me/"+phone+"?text="+encoded; }
  else { url = "https://wa.me/?text="+encoded; }
  window.open(url, "_blank");
}

/* ================= RENDER ORCHESTRATION ================= */
function renderAll(){
  refreshStaticText();
  if(state.tab==="dashboard") renderDashboard();
  if(state.tab==="reports") renderReports();
  if(state.tab==="add") renderAddForm();
  if(state.tab==="udhar") renderUdhar();
}
mountStaticIcons();
renderAll();
checkLock();

window.addEventListener("beforeinstallprompt", function(e){ e.preventDefault(); deferredPrompt=e; document.getElementById("installBanner").style.display="flex"; });

window.addEventListener("appinstalled", function(){ document.getElementById("installBanner").style.display="none"; });

if("serviceWorker" in navigator){ window.addEventListener("load", function(){ navigator.serviceWorker.register("service-worker.js").catch(function(){}); }); }
